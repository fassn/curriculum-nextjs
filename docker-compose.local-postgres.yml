services:
  postgres:
    image: postgres:16-alpine
    container_name: curriculum-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: curriculum
      POSTGRES_USER: curriculum
      POSTGRES_PASSWORD: curriculum
    ports:
      - "${LOCAL_POSTGRES_PORT:-5433}:5432"
    volumes:
      - curriculum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculum -d curriculum"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  curriculum_postgres_data:
